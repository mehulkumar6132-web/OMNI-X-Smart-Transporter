<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMNI-X Dashboard</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #050a14;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
}

#main-ui {
    text-align: center;
    width: 100%;
    max-width: 400px;
    padding: 20px;
}

h1 {
    font-size: 2.5rem;
    color: #00d4ff;
    margin-bottom: 20px;
}

/* STATUS BOX */
#path-display {
    background: rgba(0, 212, 255, 0.15);
    border: 2px solid #00d4ff;
    padding: 15px;
    border-radius: 15px;
    margin-bottom: 20px;
    font-weight: bold;
}

/* CONTROL GRID */
.controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
}

.btn {
    border: 2px solid #00d4ff;
    width: 70px;
    height: 70px;
    border-radius: 15px;
    font-size: 22px;
    cursor: pointer;
}

.stop {
    border-color: red;
}

/* HORN */
.horn {
    grid-column: span 3;
    height: 45px;
}
</style>
</head>

<body>

<div id="main-ui">
    <h1>OMNI-X</h1>

    <div id="path-display">STATUS: READY</div>

    <div class="controls">
        <button class="btn" onclick="sendCmd('F')">▲</button>
        <button class="btn" onclick="sendCmd('L')">◀</button>
        <button class="btn stop" onclick="sendCmd('S')">STOP</button>
        <button class="btn" onclick="sendCmd('R')">▶</button>
        <button class="btn" onclick="sendCmd('B')">▼</button>
        <button class="btn horn" onclick="soundHorn()">HORN</button>
    </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// ================== CONFIG ==================
// NOTE: Replace with your own config locally (DO NOT upload real keys)
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    databaseURL: "YOUR_DATABASE_URL"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================== FUNCTIONS ==================
function sendCmd(cmd) {
    db.ref('Command').set(cmd);
}

function soundHorn() {
    db.ref('Buzzer').set(1);
    setTimeout(() => db.ref('Buzzer').set(0), 500);
}

// ================== REALTIME STATUS ==================
db.ref('PathInfo').on('value', (snapshot) => {
    const info = snapshot.val();
    if (info) {
        document.getElementById('path-display').innerText = info;
    }
});
</script>

</body>
</html>
